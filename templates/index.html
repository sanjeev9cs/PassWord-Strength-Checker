<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecurePass Analyzer</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:420px;
    background:#1e293b;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,.4);
}

h1{
    color:#fff;
    text-align:center;
    margin-bottom:25px;
}

.password-box{
    position:relative;
    margin-bottom:20px;
}

.password-box input{
    width:100%;
    padding:14px 50px 14px 15px;
    border:none;
    outline:none;
    border-radius:10px;
    font-size:16px;
}

.eye{
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    font-size:20px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#7c3aed;
    color:white;
    font-size:17px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#5b21b6;
}

.result{
    margin-top:25px;
    background:#334155;
    padding:15px;
    border-radius:10px;
}

.result h2{
    color:#22c55e;
    margin-bottom:10px;
}

.result h3{
    color:#fff;
    margin-bottom:10px;
}

.result ul{
    color:#ddd;
    padding-left:20px;
}

.result li{
    margin:8px 0;
}
</style>

</head>
<body>

<div class="container">

<h1>🔐 SecurePass Analyzer</h1>

<form method="POST">

<div class="password-box">

<input
type="password"
id="password"
name="password"
placeholder="Enter Password"
required>

<span id="togglePassword" class="eye">👁️</span>

</div>

<button type="submit">
Check Password
</button>

</form>

{% if result %}

<div class="result">

<h2>{{ result.strength }}</h2>

<h3>Score : {{ result.score }}/5</h3>

<ul>
{% for item in result.feedback %}
<li>{{ item }}</li>
{% endfor %}
</ul>

</div>

{% endif %}

</div>

<script>

const password=document.getElementById("password");
const toggle=document.getElementById("togglePassword");

toggle.addEventListener("click",function(){

if(password.type==="password"){
password.type="text";
toggle.innerHTML="🙈";
}
else{
password.type="password";
toggle.innerHTML="👁️";
}

});

</script>

</body>
</html>
